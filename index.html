<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akshat Bhatt | Strategy & Analytics</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BODY */
body {
  font-family: 'DM Sans', sans-serif;
  background: #0f0f0f;
  color: #ffffff;
  line-height: 1.6;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 50px;
  position: sticky;
  top: 0;
  background: #0f0f0f;
}

.nav-logo {
  font-weight: 600;
  font-size: 20px;
}

.nav-links {
  display: flex;
  gap: 20px;
  list-style: none;
}

.nav-links a {
  text-decoration: none;
  color: white;
}

/* HERO */
.hero-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  padding: 100px 50px;
  gap: 40px;
}

.hero-name {
  font-family: 'Playfair Display', serif;
  font-size: 60px;
}

.hero-descriptor {
  margin-top: 20px;
  color: #aaa;
}

.hero-pills {
  margin-top: 20px;
}

.pill {
  display: inline-block;
  border: 1px solid #444;
  padding: 6px 12px;
  margin: 5px;
  border-radius: 20px;
}

/* STATS */
.hero-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.stat-box {
  border: 1px solid #333;
  padding: 20px;
}

.stat-num {
  font-size: 28px;
  font-weight: bold;
}

/* SECTION */
section {
  padding: 80px 50px;
}

.section-heading {
  font-size: 40px;
  margin-bottom: 20px;
}

/* PROJECTS */
.projects-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.project-tile {
  border: 1px solid #333;
  padding: 20px;
}

/* CONTACT */
.contact-links a {
  display: inline-block;
  margin-right: 20px;
  color: white;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 40px;
  color: #777;
}

</style>
</head>

<body>

<nav>
  <div class="nav-logo">Akshat Bhatt</div>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#experience">Experience</a></li>
    <li><a href="#projects">Projects</a></li>
  </ul>
</nav>

<section id="home">
  <div class="hero-grid">
    <div>
      <h1 class="hero-name">Akshat Bhatt</h1>
      <p class="hero-descriptor">
        Data Analyst & Business Strategy Enthusiast
      </p>

      <div class="hero-pills">
        <span class="pill">Python</span>
        <span class="pill">SQL</span>
        <span class="pill">Power BI</span>
      </div>
    </div>

    <div class="hero-stats">
      <div class="stat-box">
        <div class="stat-num">1000+</div>
        <div>Orders Analyzed</div>
      </div>

      <div class="stat-box">
        <div class="stat-num">2</div>
        <div>Patents</div>
      </div>
    </div>
  </div>
</section>

<section id="projects">
  <h2 class="section-heading">Projects</h2>

  <div class="projects-layout">
    <div class="project-tile">
      Food Delivery Analysis
    </div>

    <div class="project-tile">
      Cohort Analysis
    </div>
  </div>
</section>

<section id="contact">
  <h2 class="section-heading">Contact</h2>
  <div class="contact-links">
    <a href="mailto:akshatbhatt2603@gmail.com">Email</a>
    <a href="https://linkedin.com">LinkedIn</a>
  </div>
</section>

<footer>
  © 2025 Akshat Bhatt
</footer>

</body>
</html>
